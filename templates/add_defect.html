{% extends "base.html" %}

{% block title %}Add Defect - PowerGrid{% endblock %}

{% block content %}
<div class="page-header d-print-none">
    <div class="row align-items-center">
        <div class="col">
            <div class="page-pretitle">Defect Management</div>
            <h2 class="page-title">Add Defect</h2>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Asset Name</label>
                    <input type="text" class="form-control" placeholder="Transformer T3">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" placeholder="New Delhi Substation">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Priority</label>
                    <select class="form-select">
                        <option>Low</option>
                        <option>Medium</option>
                        <option selected>High</option>
                        <option>Critical</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Status</label>
                    <select class="form-select">
                        <option selected>Open</option>
                        <option>In Progress</option>
                        <option>Resolved</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="4" placeholder="Describe the defect..."></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Assigned Engineer</label>
                    <input type="text" class="form-control" placeholder="Ravi Patel">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Expected Resolution</label>
                    <input type="date" class="form-control">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Save Defect</button>
                <a href="{{ url_for('defects') }}" class="btn btn-link">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
