{% extends "base.html" %}

{% block title %}Dashboard - PowerGrid{% endblock %}

{% block content %}
<div class="page-header d-print-none">
    <div class="row align-items-center">
        <div class="col">
            <h2 class="page-title">Dashboard</h2>
            <p class="text-muted">Welcome to the PowerGrid Management System.</p>
        </div>
    </div>
</div>

<div class="row row-deck row-cards">
    <div class="col-sm-6 col-lg-3">
        <div class="card">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="me-3">
                        <span class="badge bg-primary">Assets</span>
                    </div>
                    <div>
                        <div class="text-muted">Total assets</div>
                        <div class="h3 mb-0">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
