<header class="navbar navbar-expand-md navbar-light d-print-none border-bottom py-3">
    <div class="container-fluid">
        <a class="navbar-brand d-md-none" href="{{ url_for('dashboard') }}">PowerGrid</a>

        <div class="d-flex order-md-2 ms-auto align-items-center">
            <form method="get" action="{{ url_for('search_defects') }}" class="me-3 d-none d-md-flex gap-2">
                <div class="input-icon">
                    <span class="input-icon-addon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sm text-muted" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M0 0h24v24H0z" fill="none"></path>
                            <circle cx="10" cy="10" r="7"></circle>
                            <path d="M21 21l-4.35-4.35"></path>
                        </svg>
                    </span>
                    <input class="form-control form-control-flush ps-9" type="search" name="q" value="{{ search_query|default('') }}" placeholder="Search asset or defect ID" aria-label="Search by asset name or defect ID">
                </div>
                <select class="form-select form-select-sm w-auto" name="scope" aria-label="Defect status to search">
                    <option value="active" {% if active_page != 'history' %}selected{% endif %}>Active</option>
                    <option value="resolved" {% if active_page == 'history' %}selected{% endif %}>Resolved</option>
                </select>
            </form>

            <div class="navbar-nav align-items-center">
                <div class="nav-item dropdown">
                    <a class="nav-link d-flex lh-1 text-reset p-0" href="#" data-bs-toggle="dropdown" aria-label="Profile menu">
                        <span class="avatar avatar-sm"
                              style="background-image:url('https://ui-avatars.com/api/?name={{ current_user.username|urlencode }}&size=32&background=random');"></span>
                        <div class="d-none d-xl-block ps-2">
                            <div>{{ current_user.username }}</div>
                            <div class="mt-1 small text-muted">{{ current_user.email }}</div>
                        </div>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
                        <div class="dropdown-item text-muted small">
                            <span class="badge
                                {% if current_user.role == 'head' %}bg-purple
                                {% elif current_user.role == 'manager' %}bg-azure
                                {% elif current_user.role == 'engineer' %}bg-green
                                {% else %}bg-secondary{% endif %}">
                                {{ current_user.role | title }}
                            </span>
                            &nbsp;{{ current_user.corporation.name }}
                        </div>
                        <div class="dropdown-divider"></div>
                        {% if current_user.role == 'head' %}
                        <a class="dropdown-item" href="{{ url_for('admin_users') }}">Manage Users</a>
                        {% endif %}
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item text-danger" href="{{ url_for('logout') }}">Logout</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="navbar-nav d-none d-md-flex">
            <div class="nav-item">
                <span class="navbar-text text-muted">
                    <span class="fw-medium">{{ current_user.corporation.name }}</span> Workspace
                </span>
            </div>
        </div>
    </div>
</header>
